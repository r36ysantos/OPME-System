version: '3.8'

services:

  # ── Banco de Dados ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: sgp_postgres
    environment:
      POSTGRES_USER: sgp_user
      POSTGRES_PASSWORD: sgp_pass123
      POSTGRES_DB: sgp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgp_user -d sgp_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Backend API ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sgp_backend
    environment:
      DATABASE_URL: "postgresql://sgp_user:sgp_pass123@postgres:5432/sgp_db"
      JWT_SECRET: "sgp-sistema-gerenciamento-procedimentos-jwt-secret-key-2024"
      JWT_EXPIRES_IN: "8h"
      PORT: 3001
      NODE_ENV: production
      UPLOAD_DIR: "/app/uploads"
      MAX_FILE_SIZE: "52428800"
      ALLOWED_FILE_TYPES: "application/pdf,image/jpeg,image/png,image/jpg,image/gif,image/webp,image/bmp,image/tiff,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,text/plain,text/csv"
      CORS_ORIGIN: "http://localhost:5173"
    ports:
      - "3001:3001"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sgp_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Adminer — Interface Web Leve para o Banco ─────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: sgp_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      postgres:
        condition: service_healthy

  # ── pgAdmin 4 — Interface Web Profissional para o Banco ───────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sgp_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sgp.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
