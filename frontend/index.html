<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OPME System - Gestão de Órteses, Próteses e Materiais Especiais</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- GitHub Pages SPA redirect fix -->
    <script>
      (function(l) {
        if (l.search[1] === 'p' && l.search[2] === '=') {
          var params = l.search.slice(1).split('&');
          var path = '';
          var query = '';
          params.forEach(function(param) {
            if (param.startsWith('p=')) {
              path = '/' + param.slice(2).replace(/~and~/g, '&');
            } else if (param.startsWith('q=')) {
              query = '?' + param.slice(2).replace(/~and~/g, '&');
            }
          });
          window.history.replaceState(
            null, null,
            '/OPME-System' + path + query + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
